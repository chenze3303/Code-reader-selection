<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>海康机器人 · 读码器选型</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f2f5;
      font-family: 'Nunito', 'Segoe UI', 'Poppins', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.2rem;
      color: #1a2632;
    }

    .app-window {
      max-width: 1200px;
      width: 100%;
      background: #ffffff;
      border-radius: 40px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .titlebar {
      background: #ffffff;
      padding: 0.8rem 1.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #eef2f6;
    }

    .logo-area h1 {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1f2c38, #f76504);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .badge {
      background: #f2f5f8;
      color: #f76504;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      font-size: 0.65rem;
      font-weight: 700;
    }

    .status-badge {
      font-size: 0.7rem;
      background: #f0f4f8;
      padding: 0.25rem 0.8rem;
      border-radius: 40px;
      color: #5d6f7e;
    }

    .main-content {
      display: flex;
      gap: 1.8rem;
      padding: 1.5rem 1.8rem;
      min-height: 520px;
    }

    .left-panel {
      width: 42%;
      flex-shrink: 0;
    }

    .right-panel {
      width: 58%;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .card {
      background: #ffffff;
      border-radius: 28px;
      padding: 1.2rem 1.4rem;
      border: 1px solid #eef2f6;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.04);
    }

    .card-header {
      font-weight: 800;
      font-size: 1rem;
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #1f2c38;
      border-left: 4px solid #f76504;
      padding-left: 0.7rem;
    }

    .form-section {
      margin-bottom: 1.2rem;
    }
    .form-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: #f76504;
      margin-bottom: 0.5rem;
      letter-spacing: 0.5px;
      border-bottom: 1px dashed #eef2f6;
      padding-bottom: 0.2rem;
    }
    .compact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.9rem;
    }

    label {
      font-weight: 700;
      font-size: 0.65rem;
      color: #5d6f7e;
      display: block;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
    }

    select, input {
      background: #fcfdfe;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      padding: 0.55rem 0.8rem;
      font-size: 0.8rem;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
      font-family: inherit;
      color: #1f2c38;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }

    select option {
      background: #ffffff;
      color: #1f2c38;
    }
    select option:checked {
      background: #fef3e8;
      color: #f76504;
    }
    select option:hover {
      background: #fef3e8 !important;
      color: #f76504 !important;
    }

    input::placeholder {
      font-size: 0.7rem;
      color: #a0b0c0;
      font-weight: 400;
    }

    select:focus, input:focus {
      border-color: #f76504;
      box-shadow: 0 0 0 2px rgba(247, 101, 4, 0.1);
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .input-row select {
      width: auto;
      min-width: 70px;
      flex-shrink: 0;
    }
    .input-row input {
      flex: 1;
    }

    .btn-primary {
      background: linear-gradient(105deg, #f76504, #e05a00);
      color: white;
      border: none;
      padding: 0.75rem 1rem;
      border-radius: 40px;
      font-weight: 800;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      margin-top: 0.5rem;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 3px 8px rgba(247, 101, 4, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(247, 101, 4, 0.25);
    }
    .btn-primary:active {
      transform: translateY(1px);
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid #f76504;
      color: #f76504;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      width: 100%;
      margin-top: 0.6rem;
    }

    .btn-outline:hover {
      background: #fef3e8;
      transform: scale(0.98);
    }

    .calc-box {
      background: #fafcfd;
      border-radius: 20px;
      padding: 0.7rem 1rem;
      font-size: 0.8rem;
      margin-bottom: 0.6rem;
      border-left: 4px solid #f76504;
    }

    .result-main {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.8rem;
      align-items: stretch;
    }
    .result-card {
      flex: 1;
      background: #f9fbfd;
      border-radius: 24px;
      padding: 0.7rem;
      text-align: center;
      border: 1px solid #eef2f6;
    }
    .result-card strong {
      display: block;
      font-size: 0.7rem;
      color: #5d6f7e;
      margin-bottom: 0.3rem;
    }
    .result-card span {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1f2c38;
    }

    .model-preview {
      background: #f8fafc;
      border-radius: 40px;
      padding: 0.6rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
      background: #f2f5f8;
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
      font-size: 0.6rem;
      font-weight: 700;
      color: #f76504;
    }

    .code-img-container {
      margin: 0.8rem 0 0.2rem 0;
      text-align: center;
      background: #fafcff;
      border-radius: 24px;
      padding: 0.5rem;
      border: 1px solid #eef2f6;
    }
    .code-type-img {
      width: 100%;
      max-width: 100%;
      border-radius: 20px;
      background: #fef9f0;
    }
    .img-caption {
      font-size: 0.65rem;
      color: #8f9eae;
      margin-top: 0.3rem;
      font-weight: 500;
    }

    /* 圆形复选框样式 */
    .series-filter-bar {
      background: #f8fafc;
      border-radius: 32px;
      padding: 0.7rem 1rem;
      margin-bottom: 1rem;
      border: 1px solid #eef2f6;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
    }
    .filter-label {
      font-weight: 800;
      font-size: 0.7rem;
      color: #f76504;
      background: #fff0e5;
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
    }
    .filter-check-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
    }
    .series-check {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      color: #1a2c3a;
      background: white;
      padding: 0.2rem 0.7rem 0.2rem 0.5rem;
      border-radius: 40px;
      border: 1px solid #e2e8f0;
      transition: all 0.15s ease;
    }
    .series-check:hover {
      background: #fef7f0;
      border-color: #f76504;
    }
    .series-check input {
      display: none;
    }
    .check-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffffff;
      border: 1.5px solid #cbd5e1;
      display: inline-block;
      transition: all 0.1s ease;
      box-sizing: border-box;
    }
    .series-check input:checked + .check-dot {
      background: #f76504;
      border-color: #f76504;
      box-shadow: 0 0 0 1px rgba(247, 101, 4, 0.2);
    }
    .series-check:has(input:checked) {
      background: #fef3e8;
      border-color: #f76504;
      color: #f76504;
    }
    .filter-reset-btn {
      background: transparent;
      border: none;
      color: #f76504;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
    }
    .filter-reset-btn:hover {
      background: #fff0e5;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal {
      background: white;
      border-radius: 36px;
      max-width: 860px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 1.5rem;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.15);
      transform: scale(0.96);
      transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal::-webkit-scrollbar {
      width: 0;
      background: transparent;
    }
    .modal {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid #eef2f6;
      padding-bottom: 0.8rem;
    }

    .modal-header h2 {
      font-size: 1.2rem;
      font-weight: 800;
      color: #1f2c38;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #8f9eae;
      line-height: 1;
    }

    .modal-close:hover {
      color: #f76504;
    }

    .modal-model-list {
      max-height: 65vh;
      overflow-y: auto;
      padding-right: 0.3rem;
    }
    .modal-model-list::-webkit-scrollbar {
      width: 0;
      background: transparent;
    }

    .modal-model-entry {
      border: 1px solid #eef2f6;
      border-radius: 24px;
      padding: 1rem;
      margin-bottom: 1rem;
      transition: all 0.15s;
      background: #ffffff;
    }

    .modal-model-entry.recommended {
      border-left: 4px solid #f76504;
      background: #fffbf5;
    }

    .modal-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .modal-model-name {
      font-size: 1rem;
      font-weight: 800;
      color: #1f2c38;
    }
    .modal-model-series {
      background: #f2f5f8;
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #f76504;
    }

    .modal-spec-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, auto));
      gap: 0.6rem;
      margin-bottom: 0.8rem;
      padding: 0.5rem 0;
      border-top: 1px dashed #eef2f6;
      border-bottom: 1px dashed #eef2f6;
    }
    .spec-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
      color: #5d6f7e;
    }
    .spec-icon {
      font-size: 0.85rem;
    }

    .ppm-value-row {
      margin: 0.5rem 0;
      font-size: 0.75rem;
      color: #5d6f7e;
    }
    .ppm-value-highlight {
      font-weight: 800;
      color: #f76504;
      font-size: 0.85rem;
    }

    .info-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 0.6rem 0;
      font-size: 0.75rem;
    }
    .info-tag {
      background: #fef3e8;
      border-radius: 40px;
      padding: 0.2rem 0.7rem;
      color: #f76504;
      font-weight: 600;
    }

    .reasons-row {
      margin-top: 0.6rem;
      font-size: 0.7rem;
      color: #5d6f7e;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .reason-badge {
      background: #f0f4f8;
      padding: 0.15rem 0.6rem;
      border-radius: 30px;
      font-size: 0.7rem;
    }

    .warning-badge {
      background: #fff3e0;
      color: #f76504;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      text-align: center;
    }

    .empty-state {
      color: #8f9eae;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
    }

    .fov-highlight-badge {
      background: #eef2ff;
      color: #1f2c38;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
    }

    @media (max-width: 800px) {
      .main-content { flex-direction: column; }
      .left-panel, .right-panel { width: 100%; }
      .modal { width: 95%; padding: 1rem; }
      .compact-grid { grid-template-columns: 1fr; gap: 0.8rem; }
      .series-filter-bar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="app-window">
  <div class="titlebar">
    <div class="logo-area">
      <h1>📷 Hikrobot 读码器选型 <span class="badge">V2.1</span></h1>
    </div>
    <div class="status-badge">✨ 计算选型仅供参考，建议选型后实测</div>
  </div>

  <div class="main-content">
    <div class="left-panel">
      <div class="card">
        <div class="card-header">📋 核心参数配置</div>
        
        <div class="form-section">
          <div class="form-section-title">🔖 码制 & 模块尺寸</div>
          <div class="compact-grid">
            <div>
              <label>码制类型 *</label>
              <select id="codeType">
                <option value="">-- 请选择 --</option>
                <option value="QR">二维码 (2D)</option>
                <option value="Code39">一维码 (1D)</option>
              </select>
            </div>
            <div>
              <label>模块尺寸 *</label>
              <div class="input-row">
                <input type="number" id="moduleSize" value="" placeholder="请输入数值">
                <select id="moduleUnit"><option value="mil">mil</option><option value="mm" selected>mm</option></select>
              </div>
            </div>
          </div>
          <div class="code-img-container">
            <img src="code-type-desc.png" alt="码制类型与模块尺寸说明" class="code-type-img" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22120%22%3E%3Crect width=%22400%22 height=%22120%22 fill=%22%23fef3e8%22 rx=%2212%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 fill=%22%23f76504%22 font-size=%2214%22%3E📖 码制示意：QR / Code39%3C/text%3E%3C/svg%3E';">
            <div class="img-caption">💡 码制类型与模块尺寸说明</div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">📐 距离 & 视野参数</div>
          <div class="compact-grid">
            <div>
              <label>工作距离 *</label>
              <div class="input-row">
                <input type="number" id="workingDistance" value="" placeholder="请输入数值">
                <select id="distanceUnit"><option value="mm" selected>mm</option><option value="cm">cm</option></select>
              </div>
            </div>
            <div>
              <label>期望视野宽度 *</label>
              <div class="input-row">
                <input type="number" id="fovWidth" value="" placeholder="请输入数值">
                <select id="fovUnit"><option value="mm" selected>mm</option><option value="cm">cm</option></select>
              </div>
            </div>
            <div>
              <label>期望视野高度 *</label>
              <div class="input-row">
                <input type="number" id="fovHeight" value="" placeholder="请输入数值">
                <select id="fovHeightUnit"><option value="mm" selected>mm</option><option value="cm">cm</option></select>
              </div>
            </div>
            <div></div>
          </div>
        </div>

        <button class="btn-primary" id="runBtn">⚡ 开始智能选型</button>
      </div>
    </div>

    <div class="right-panel">
      <div class="card">
        <div class="card-header">🔢 分辨率 & 精度 </div>
        <div id="calcContent" class="empty-state">等待参数输入...</div>
      </div>

      <div class="card">
        <div class="card-header">🏆 最佳推荐</div>
        <div id="top1Content" class="empty-state">等待参数输入...</div>
        <button class="btn-outline" id="showModalBtn" style="margin-top: 0.6rem;" disabled>📋 查看所有满足条件的型号清单</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modelModal">
  <div class="modal">
    <div class="modal-header">
      <h2>📌 满足过滤条件的推荐型号</h2>
      <button class="modal-close" id="closeModalBtn">&times;</button>
    </div>
    <div class="series-filter-bar">
      <span class="filter-label">🔍 按系列筛选</span>
      <div class="filter-check-group" id="seriesCheckGroup">
        <label class="series-check"><input type="checkbox" value="ID800" checked> <span class="check-dot"></span> ID800</label>
        <label class="series-check"><input type="checkbox" value="ID2000" checked> <span class="check-dot"></span> ID2000</label>
        <label class="series-check"><input type="checkbox" value="ID3000" checked> <span class="check-dot"></span> ID3000</label>
        <label class="series-check"><input type="checkbox" value="ID5000" checked> <span class="check-dot"></span> ID5000</label>
      </div>
      <button class="filter-reset-btn" id="resetSeriesFilterBtn">全选</button>
    </div>
    <div id="modalModelList" class="modal-model-list">
      <div class="empty-state">请先进行选型</div>
    </div>
  </div>
</div>

<script>
  (function() {

      { model: "ID2013EM-05M", series: "ID2000", resolution: { w: 1024, h: 1280 }, pixelSize: 2.7, focal: 4.63, interface: "Fast Ethernet、RS232、USB3.0", protection: "IP54", workingDist: { min: 40, max: 120 } },
      { model: "ID2004M-06M", series: "ID2000", resolution: { w: 704, h: 540 }, pixelSize: 6.9, focal: 6.72, interface: "Fast Ethernet、RS232、USB3.0", protection: "IP65", workingDist: { min: 40, max: 120 } },
      { model: "ID2004M-16T", series: "ID2000", resolution: { w: 704, h: 540 }, pixelSize: 6.9, focal: 16, interface: "Fast Ethernet、RS232", protection: "IP65", workingDist: { min: 100, max: 400 } },
      { model: "ID2013M-06M", series: "ID2000", resolution: { w: 1280, h: 1024 }, pixelSize: 4, focal: 6.72, interface: "Fast Ethernet、RS232", protection: "IP65", workingDist: { min: 40, max: 120 } },

      { model: "ID5120XM-00C-25", series: "ID5000", resolution: { w: 4096, h: 3072 }, pixelSize: 3.45, focal: 25, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 100, max: 2000 } },
      { model: "ID5120XM-00C-35", series: "ID5000", resolution: { w: 4096, h: 3072 }, pixelSize: 3.45, focal: 35, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 200, max: 2000 } },
      { model: "ID5120XM-00C-50", series: "ID5000", resolution: { w: 4096, h: 3072 }, pixelSize: 3.45, focal: 50, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 300, max: 2000 } },
      { model: "ID5120RM-08M", series: "ID5000", resolution: { w: 4096, h: 3024 }, pixelSize: 2, focal: 8, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 25, max: 2000 } },
      { model: "ID5120RM-12M", series: "ID5000", resolution: { w: 4096, h: 3024 }, pixelSize: 2, focal: 12, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 60, max: 2000 } },
      { model: "ID5120RM-16M", series: "ID5000", resolution: { w: 4096, h: 3024 }, pixelSize: 2, focal: 16, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 100, max: 2000 } },
      { model: "ID5120RM-25M", series: "ID5000", resolution: { w: 4096, h: 3024 }, pixelSize: 2, focal: 25, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 230, max: 2000 } },
      { model: "ID5120RM-08L", series: "ID5000", resolution: { w: 4096, h: 3024 }, pixelSize: 2, focal: 8, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 100, max: 2000 } },
      { model: "ID5120RM-12L", series: "ID5000", resolution: { w: 4096, h: 3024 }, pixelSize: 2, focal: 12, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 100, max: 2000 } },
      { model: "ID5120RM-16L", series: "ID5000", resolution: { w: 4096, h: 3024 }, pixelSize: 2, focal: 16, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 100, max: 2000 } },
      { model: "ID5120RM-00C-08", series: "ID5000", resolution: { w: 4096, h: 3024 }, pixelSize: 2, focal: 8, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 100, max: 2000 } },
      { model: "ID5120RM-00C-12", series: "ID5000", resolution: { w: 4096, h: 3024 }, pixelSize: 2, focal: 12, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 100, max: 2000 } },
      { model: "ID5120RM-00C-16", series: "ID5000", resolution: { w: 4096, h: 3024 }, pixelSize: 2, focal: 16, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 100, max: 2000 } },
      { model: "ID5120RM-00C-25", series: "ID5000", resolution: { w: 4096, h: 3024 }, pixelSize: 2, focal: 25, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 100, max: 2000 } },
      { model: "ID5120RM-00C-35", series: "ID5000", resolution: { w: 4096, h: 3024 }, pixelSize: 2, focal: 35, interface: "Gigabit Ethernet、RS232", protection: "IP67", workingDist: { min: 250, max: 2000 } },
    ];

  function toMM(value, unit) {
    if (unit === 'mil') return value * 0.0254;
    if (unit === 'cm') return value * 10;
    return parseFloat(value);
  }

  function estimateFOV(model, wdMM) {
    if (!model.focal || !model.pixelSize) return null;
    const sensorWidth = (model.resolution.w * model.pixelSize) / 1000;
    const fovWidth = (sensorWidth * wdMM) / model.focal;
    const sensorHeight = (model.resolution.h * model.pixelSize) / 1000;
    const fovHeight = (sensorHeight * wdMM) / model.focal;
    return { width: Math.round(fovWidth), height: Math.round(fovHeight) };
  }

  function isCodeType2D(codeType) { return codeType === 'QR'; }
  function getPPMFilterRange(codeType) { return isCodeType2D(codeType) ? { min: 3, max: 20 } : { min: 1, max: 4 }; }
  function getPPMScoreAndLevel(ppm, codeType) {
    const is2D = isCodeType2D(codeType);
    if (is2D) {
      if (ppm >= 4 && ppm <= 8) return { score: 30, level: '优秀' };
      if (ppm > 8 && ppm <= 12) return { score: 25, level: '良好' };
      if (ppm >= 12 || (ppm >= 3 && ppm < 4)) return { score: 15, level: '合格' };
      if (ppm < 3) return { score: -15, level: '较低' };
      return { score: 0, level: '未知' };
    } else {
      if (ppm >= 1.4 && ppm <= 2) return { score: 30, level: '优秀' };
      if (ppm >= 2 && ppm <= 3) return { score: 25, level: '良好' };
      if ((ppm >= 1 && ppm < 1.4) || ppm >= 3) return { score: 15, level: '合格' };
      if (ppm < 1) return { score: -15, level: '较低' };
      return { score: 0, level: '未知' };
    }
  }

  let cachedFilteredList = null;
  let cachedWdMM = null, cachedCodeType = null, cachedPPMFilterRange = null;
  let cachedModuleMM = null, cachedFovReqW = null, cachedFovReqH = null;

  function resetToEmpty() {
    document.getElementById('calcContent').innerHTML = '<div class="empty-state">等待参数输入...</div>';
    document.getElementById('top1Content').innerHTML = '<div class="empty-state">等待参数输入...</div>';
    document.getElementById('showModalBtn').disabled = true;
    cachedFilteredList = null;
  }

  function runSelection() {
    const codeType = document.getElementById('codeType').value;
    const mSize = parseFloat(document.getElementById('moduleSize').value);
    const mUnit = document.getElementById('moduleUnit').value;
    const fovW = parseFloat(document.getElementById('fovWidth').value);
    const fovWUnit = document.getElementById('fovUnit').value;
    const fovH = parseFloat(document.getElementById('fovHeight').value);
    const fovHUnit = document.getElementById('fovHeightUnit').value;
    const wd = parseFloat(document.getElementById('workingDistance').value);
    const dUnit = document.getElementById('distanceUnit').value;

    if (!codeType || isNaN(mSize) || isNaN(fovW) || isNaN(fovH) || isNaN(wd) || mSize <= 0 || fovW <= 0 || fovH <= 0 || wd <= 0) {
      alert('请完整填写所有必填参数（码制类型、模块尺寸、工作距离、视野宽度、视野高度），且数值必须大于0');
      resetToEmpty();
      return;
    }

    cachedCodeType = codeType;
    cachedPPMFilterRange = getPPMFilterRange(codeType);
    const moduleMM = toMM(mSize, mUnit);
    const fovReqW_mm = toMM(fovW, fovWUnit);
    const fovReqH_mm = toMM(fovH, fovHUnit);
    const wdMM = toMM(wd, dUnit);
    cachedWdMM = wdMM;
    cachedModuleMM = moduleMM;
    cachedFovReqW = fovReqW_mm;
    cachedFovReqH = fovReqH_mm;
    const is2D = isCodeType2D(codeType);
    const divisor = is2D ? 5 : 1.5;
    const requiredPrecision = moduleMM / divisor;
    const requiredPixelsW = Math.ceil(fovReqW_mm / requiredPrecision);
    const requiredPixelsH = Math.ceil(fovReqH_mm / requiredPrecision);

    // 预先展示基础参数
    let infoHtml = `<div class="calc-box">🔎 模块尺寸: ${moduleMM.toFixed(4)} mm | 工作距离: ${wdMM} mm</div>
                    <div class="calc-box">📏 需求视野: 宽度 ≥ ${fovReqW_mm} mm / 高度 ≥ ${fovReqH_mm} mm<br><span style="font-size:0.65rem;"></span></div>`;
    
    const allScored = PRODUCT_DB.map(model => {
      let score = 0, reasons = [];
      const sensorWidthPx = model.resolution.w;
      const sensorHeightPx = model.resolution.h;
      const fovEst = estimateFOV(model, wdMM);
      let ppm = null, ppmLevel = '', ppmScore = 0;
      if (model.focal && fovEst) {
        ppm = (sensorWidthPx / fovEst.width) * moduleMM;
        const ppmResult = getPPMScoreAndLevel(ppm, codeType);
        ppmScore = ppmResult.score;
        ppmLevel = ppmResult.level;
      }
      if (sensorWidthPx >= requiredPixelsW && sensorHeightPx >= requiredPixelsH) { score += 30; reasons.push(`分辨率满足`); }
      else if ((sensorWidthPx >= requiredPixelsW * 0.8 && sensorHeightPx >= requiredPixelsH * 0.8)) { score += 15; reasons.push(`分辨率接近`); }
      else { score -= 20; reasons.push(`分辨率偏低`); }
      if (ppm !== null) { score += ppmScore; reasons.push(`PPM${ppmLevel}(${ppm.toFixed(2)})`); }
      else { score += 5; reasons.push('C-Mount'); }
      if (wdMM >= model.workingDist.min && wdMM <= model.workingDist.max) { score += 15; reasons.push(`距离适配`); }
      else { score -= 5; reasons.push(`距离不适配`); }
      if (model.focal && fovEst) {
        if (fovEst.width >= fovReqW_mm && fovEst.height >= fovReqH_mm) { score += 15; reasons.push(`视野满足`); }
        else { score -= 20; reasons.push(`视野不足`); }
      }
      return { model, score, ppm, ppmLevel, reasons, fovEst };
    });
    allScored.sort((a, b) => b.score - a.score);
    const filtered = allScored.filter(item => {
      const wdOK = (cachedWdMM >= item.model.workingDist.min && cachedWdMM <= item.model.workingDist.max);
      let ppmOK = true;
      if (item.model.focal && item.ppm !== null) ppmOK = (item.ppm >= cachedPPMFilterRange.min && item.ppm <= cachedPPMFilterRange.max);
      let fovOK = true;
      if (item.model.focal && item.fovEst) fovOK = (item.fovEst.width >= cachedFovReqW && item.fovEst.height >= cachedFovReqH);
      return wdOK && ppmOK && fovOK;
    });
    cachedFilteredList = filtered;
    document.getElementById('showModalBtn').disabled = false;
    
    if (filtered.length > 0) {
      const best = filtered[0];
      const ppmDisplay = best.ppm !== null ? best.ppm.toFixed(2) : '—';
      const ppmLevelDisplay = best.ppmLevel ? ` (${best.ppmLevel})` : '';
      const fovText = best.fovEst ? `预估视野 ${best.fovEst.width}×${best.fovEst.height} mm` : 'C-Mount 外接镜头';
      // 在分辨率精度区域添加预估视野
      document.getElementById('calcContent').innerHTML = infoHtml;
      
      document.getElementById('top1Content').innerHTML = `
        <div class="result-main"><div class="result-card"><strong>首选型号</strong><span>${best.model.model}</span></div><div class="result-card"><strong>PPM</strong><span>${ppmDisplay}${ppmLevelDisplay}</span></div></div>
        <div class="model-preview"><span>${best.model.series} · ${best.model.resolution.w}×${best.model.resolution.h} · ${best.model.interface}</span><span class="tag">${best.model.protection}</span></div>
        <div style="margin-top: 0.5rem; font-size: 0.7rem; color: #f76504; background: #fff4e8; padding: 0.3rem 0.6rem; border-radius: 30px; text-align: center;">🔍 ${fovText}</div>
      `;
    } else {
      infoHtml += `<div class="calc-box" style="background:#fff0e0;">⚠️ 无完全匹配型号，请尝试放宽视野或调整工作距离</div>`;
      document.getElementById('calcContent').innerHTML = infoHtml;
      document.getElementById('top1Content').innerHTML = `<div class="warning-badge">⚠️ 没有找到同时满足所有条件的型号<br>请调整参数后重试</div>`;
    }
  }

  function renderModalWithSeriesFilter() {
    if (!cachedFilteredList || cachedFilteredList.length === 0) {
      document.getElementById('modalModelList').innerHTML = '<div class="empty-state">暂无满足条件的型号，请调整参数后重新选型</div>';
      return;
    }
    const checkboxes = document.querySelectorAll('#seriesCheckGroup input[type="checkbox"]');
    const selectedSeries = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
    let filteredBySeries = cachedFilteredList.filter(item => selectedSeries.includes(item.model.series));
    if (filteredBySeries.length === 0) {
      document.getElementById('modalModelList').innerHTML = `<div class="warning-badge">⚠️ 当前勾选的系列中无匹配型号，请勾选其他系列</div>`;
      return;
    }
    let html = '';
    filteredBySeries.forEach((item, idx) => {
      const m = item.model;
      const fovEst = item.fovEst;
      const ppmDisplay = item.ppm !== null ? item.ppm.toFixed(2) : '— (C-Mount)';
      const ppmLevelDisplay = item.ppmLevel ? ` (${item.ppmLevel})` : '';
      const fovStatus = fovEst ? `📐 预估视野 ${fovEst.width}×${fovEst.height}mm` : '🔧 C-Mount';
      html += `<div class="modal-model-entry ${idx === 0 ? 'recommended' : ''}"><div class="modal-entry-header"><span class="modal-model-name">${m.model}</span><span class="modal-model-series">${m.series}</span></div><div class="modal-spec-grid"><div class="spec-item">🔘 ${m.resolution.w}×${m.resolution.h}</div><div class="spec-item">🔌 ${m.interface}</div><div class="spec-item">🛡️ ${m.protection}</div><div class="spec-item">${m.focal ? `🔍 ${m.focal}mm` : '🔧 C-Mount'}</div></div><div class="ppm-value-row"><span>📊 真实 PPM：<span class="ppm-value-highlight">${ppmDisplay}</span>${ppmLevelDisplay}</span></div><div class="info-row"><span class="info-tag">📏 工作距离 ${m.workingDist.min}-${m.workingDist.max}mm</span><span class="info-tag">${fovStatus}</span></div><div class="reasons-row">${item.reasons.map(r => `<span class="reason-badge">✨ ${r}</span>`).join('')}</div></div>`;
    });
    document.getElementById('modalModelList').innerHTML = html;
  }

  function initModal() {
    const modal = document.getElementById('modelModal');
    const showBtn = document.getElementById('showModalBtn');
    const closeBtn = document.getElementById('closeModalBtn');
    const resetBtn = document.getElementById('resetSeriesFilterBtn');
    showBtn.addEventListener('click', () => { renderModalWithSeriesFilter(); modal.classList.add('active'); });
    closeBtn.addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
    const seriesChecks = document.querySelectorAll('#seriesCheckGroup input');
    seriesChecks.forEach(cb => { cb.addEventListener('change', () => { if (modal.classList.contains('active')) renderModalWithSeriesFilter(); }); });
    if (resetBtn) resetBtn.addEventListener('click', () => { seriesChecks.forEach(cb => cb.checked = true); if (modal.classList.contains('active')) renderModalWithSeriesFilter(); });
  }

  function init() {
    document.getElementById('codeType').value = '';
    document.getElementById('moduleSize').value = '';
    document.getElementById('workingDistance').value = '';
    document.getElementById('fovWidth').value = '';
    document.getElementById('fovHeight').value = '';
    document.getElementById('moduleUnit').value = 'mm';
    document.getElementById('distanceUnit').value = 'mm';
    document.getElementById('fovUnit').value = 'mm';
    document.getElementById('fovHeightUnit').value = 'mm';
    resetToEmpty();
    document.getElementById('runBtn').addEventListener('click', runSelection);
    initModal();
  }
  init();
})();
</script>
